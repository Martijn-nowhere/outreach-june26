name: Keep Alive

on:
  schedule:
    # Every Monday at 06:00 UTC (before the outreach run)
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update keep-alive timestamp
        run: |
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .github/keep-alive.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/keep-alive.txt
          git commit -m "chore: keep-alive $(date -u +%Y-%m-%d)"
          git push
